services:
  towteam:
    image: node:20-bookworm-slim
    container_name: towteam
    working_dir: /app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      DATABASE_URL: /app/data/towteam.sqlite
      NODE_ENV: production
    volumes:
      - .:/app
      - towteam_node_modules:/app/node_modules
      - ./data:/app/data
    command: sh -c "npm install && npm run build && npm run start"

volumes:
  towteam_node_modules:
